<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        section {
            padding: 2rem;
        }
        .portfolio-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 1rem 0;
            padding: 1rem;
            transition: transform 0.3s;
        }
        .portfolio-item:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section>
        <div class="portfolio-item">
            <h2>Project 1</h2>
            <p>Description of project 1.</p>
        </div>
        <div class="portfolio-item">
            <h2>Project 2</h2>
            <p>Description of project 2.</p>
        </div>
    </section>
    <footer>
        <p>© 2026 Harshal Marathe. All rights reserved.</p>
    </footer>
</body>
</html>
