<!DOCTYPE html>
<html lang="en">
<head>

    <title>My First Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        /* Adding some animations */
        .fade-in {
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="fade-in">Welcome to My Portfolio</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="about">
        <h2 class="fade-in">About Me</h2>
        <p>My name is Harshal Marathe, and I am a passionate developer.</p>
    </section>
    <section id="projects">
        <h2 class="fade-in">My Projects</h2>
        <ul>
            <li>Project 1</li>
            <li>Project 2</li>
            <li>Project 3</li>
        </ul>
    </section>
    <footer>
        <h2 class="fade-in">Contact</h2>
        <p>Email: harshal@example.com</p>
    </footer>
</body>
</html>
